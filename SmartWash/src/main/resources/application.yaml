server:
  error:
    include-message: never
    include-stacktrace: never

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/smart_wash?useUnicode=true&characterEncoding=UTF-8&zeroDateTimeBehavior=convertToNull&autoReconnect=true&allowMultiQueries=true&serverTimezone=GMT%2B8&rewriteBatchedStatements=true&useSSL=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:admin123}

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: 3
      password: ${REDIS_PASSWORD:}

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

mybatis-plus:
  global-config:
    db-config:
      update-strategy: not_empty
  configuration:
    map-underscore-to-camel-case: true

jwt:
  # 生产环境务必通过环境变量 JWT_SECRET 覆盖此默认值（Base64 编码的 32 字节密钥）
  secret: ${JWT_SECRET:hfsBEX6lFJyBuy9nBTRnQS7WMEZkEp+IZeYpBf6Heoc=}

cors:
  # 生产环境配置实际域名，多个用逗号分隔，支持通配符模式（如 https://*.smartwash.com）
  allowed-origins: ${CORS_ORIGINS:http://localhost:*,http://192.168.*}

# MinIO 对象存储配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://192.168.1.61:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET:smartwash}
