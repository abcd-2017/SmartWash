<h2>登录页设计 — 深邃高级风格</h2>
<p class="subtitle">基于 Indigo + Slate 配色，三种不同的登录页布局</p>

<div class="cards">

    <div class="card-image">
      <div class="mockup">
        <div class="mockup-header">方案 A：沉浸式全屏</div>
        <div class="mockup-body">
          <div style="width:100%;height:220px;border-radius:8px;overflow:hidden;display:flex;">
            <div style="flex:1;background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#312e81 100%);display:flex;align-items:center;justify-content:center;flex-direction:column;color:#fff;padding:20px;">
              <div style="font-size:18px;font-weight:700;margin-bottom:4px;">SmartWash</div>

            </div>
            <div style="width:260px;background:#fff;padding:24px;display:flex;flex-direction:column;justify-content:center;">
              <div style="font-size:13px;font-weight:600;margin-bottom:12px;color:#1e293b;">管理员登录</div>
              <div style="height:8px;border-radius:4px;background:#f1f5f9;margin-bottom:8px;"></div>
              <div style="height:8px;border-radius:4px;background:#f1f5f9;margin-bottom:12px;"></div>
              <div style="height:28px;border-radius:6px;background:#6366f1;width:100%;"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

      <h3>沉浸式全屏</h3>

          <div style="width:100%;height:220px;border-radius:8px;overflow:hidden;background:#f1f5f9;display:flex;align-items:center;justify-content:center;">

          </div>

              <div style="height:8px;border-radius:4px;background:#f1f5f9;margin-bottom:12px;"></div>
